<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Thermal 58mm</title>
    <!-- Library PDF.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            font-family: Arial, sans-serif; 
            margin: 0;
            padding: 0;
        }
        body { 
            background-color: #f4f4f9; 
            padding: 15px; 
            display: block; /* Mencegah elemen berjejer ke samping */
        }
        .container { 
            background: #fff; 
            width: 100%; 
            max-width: 450px; 
            margin: 0 auto;
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
        }
        h2 { 
            text-align: center; 
            border-bottom: 2px dashed #333; 
            padding-bottom: 10px; 
            margin-bottom: 15px; 
            font-size: 18px;
        }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 14px; }
        input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button { padding: 12px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-connect { background: #2980b9; color: white; }
        .btn-print { background: #27ae60; color: white; }
        .btn-print:disabled { background: #a5d6a7; cursor: not-allowed; }
        .status { margin-top: 15px; padding: 10px; background: #eee; text-align: center; font-size: 12px; border-radius: 4px; font-weight: bold; }
        
        /* Area Preview */
        .preview-box { margin-top: 15px; text-align: center; background: #fffde7; border: 1px dashed #999; padding: 10px; border-radius: 4px; }
        canvas { max-width: 100%; height: auto; border: 1px solid #ddd; margin-top: 5px; background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2>🖨️ Cetak PDF & Foto (58mm)</h2>

    <div class="form-group">
        <label for="fileInput">Pilih File (PDF, JPG, PNG, WEBP):</label>
        <input type="file" id="fileInput" accept="application/pdf, image/jpeg, image/png, image/webp">
    </div>

    <div class="btn-group">
        <button class="btn-connect" onclick="connectPrinter()">🔌 1. Sambungkan Printer</button>
        <button class="btn-print" id="btnPrint" onclick="startPrintProcess()" disabled>🖨️ 2. Cetak Sekarang</button>
    </div>

    <div id="status" class="status">Status: Belum Terhubung</div>

    <div class="preview-box">
        <label>Pratinjau Hasil Render (58mm):</label>
        <div><canvas id="renderCanvas"></canvas></div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let bluetoothDevice;
    let gattCharacteristic;
    let currentFileType = null; 
    let currentPdfDoc = null;
    let loadedImageElement = null;
    
    const MAX_PRINTER_WIDTH = 384; // Width pixel max printer 58mm

    document.getElementById('fileInput').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const statusEl = document.getElementById('status');
        
        if (file.type === 'application/pdf') {
            currentFileType = 'pdf';
            statusEl.innerText = "Membaca file PDF...";
            
            const fileReader = new FileReader();
            fileReader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                try {
                    currentPdfDoc = await pdfjsLib.getDocument(typedarray).promise;
                    statusEl.innerText = `PDF Berhasil Dimuat (${currentPdfDoc.numPages} Halaman)`;
                    await renderPdfPageToCanvas(1);
                } catch (err) {
                    console.error(err);
                    statusEl.innerText = "Gagal membaca PDF: " + err.message;
                }
            };
            fileReader.readAsArrayBuffer(file);

        } else if (file.type.startsWith('image/')) {
            currentFileType = 'image';
            statusEl.innerText = "Membaca file gambar...";

            const fileReader = new FileReader();
            fileReader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    loadedImageElement = img;
                    renderImageToCanvas(img);
                    statusEl.innerText = "Gambar Berhasil Dimuat ✅";
                };
                img.src = event.target.result;
            };
            fileReader.readAsDataURL(file);

        } else {
            alert('Format file tidak didukung!');
        }
    });

    async function renderPdfPageToCanvas(pageNumber) {
        if (!currentPdfDoc) return;

        const page = await currentPdfDoc.getPage(pageNumber);
        const unscaledViewport = page.getViewport({ scale: 1.0 });

        const scale = MAX_PRINTER_WIDTH / unscaledViewport.width;
        const viewport = page.getViewport({ scale: scale });

        const canvas = document.getElementById('renderCanvas');
        const context = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({ canvasContext: context, viewport: viewport }).promise;
    }

    function renderImageToCanvas(img) {
        const canvas = document.getElementById('renderCanvas');
        const context = canvas.getContext('2d');

        const scale = MAX_PRINTER_WIDTH / img.width;
        const targetWidth = MAX_PRINTER_WIDTH;
        const targetHeight = img.height * scale;

        canvas.width = targetWidth;
        canvas.height = targetHeight;

        context.fillStyle = "#FFFFFF";
        context.fillRect(0, 0, targetWidth, targetHeight);
        context.drawImage(img, 0, 0, targetWidth, targetHeight);
    }

    async function connectPrinter() {
        const statusEl = document.getElementById('status');
        try {
            statusEl.innerText = "Mencari printer Bluetooth...";

            bluetoothDevice = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['00001101-0000-1000-8000-00805f9b34fb', '000018f0-0000-1000-8000-00805f9b34fb']
            });

            statusEl.innerText = `Menghubungkan ke ${bluetoothDevice.name || 'Printer'}...`;
            const server = await bluetoothDevice.gatt.connect();

            let service;
            try {
                service = await server.getPrimaryService('00001101-0000-1000-8000-00805f9b34fb');
            } catch (e) {
                service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            }

            const characteristics = await service.getCharacteristics();
            gattCharacteristic = characteristics[0];

            statusEl.innerText = `Terhubung ke: ${bluetoothDevice.name || 'Printer'} ✅`;
            statusEl.style.background = "#d4edda";
            statusEl.style.color = "#155724";
            document.getElementById('btnPrint').disabled = false;
        } catch (error) {
            console.error(error);
            statusEl.innerText = "Gagal terhubung: " + error.message;
            statusEl.style.background = "#f8d7da";
            statusEl.style.color = "#721c24";
        }
    }

    function canvasToEscPosRaster(canvas) {
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const imgData = ctx.getImageData(0, 0, width, height).data;

        const bytesWide = Math.ceil(width / 8);
        const rasterData = [];

        for (let y = 0; y < height; y++) {
            for (let x = 0; x < bytesWide; x++) {
                let byte = 0;
                for (let b = 0; b < 8; b++) {
                    const pixelX = x * 8 + b;
                    if (pixelX < width) {
                        const idx = (y * width + pixelX) * 4;
                        const r = imgData[idx];
                        const g = imgData[idx + 1];
                        const bVal = imgData[idx + 2];
                        const avg = (r + g + bVal) / 3;

                        if (avg < 180) { 
                            byte |= (0x80 >> b);
                        }
                    }
                }
                rasterData.push(byte);
            }
        }

        const xL = bytesWide & 0xFF;
        const xH = (bytesWide >> 8) & 0xFF;
        const yL = height & 0xFF;
        const yH = (height >> 8) & 0xFF;

        const header = new Uint8Array([0x1D, 0x76, 0x30, 0x00, xL, xH, yL, yH]);
        const body = new Uint8Array(rasterData);

        const fullCommand = new Uint8Array(header.length + body.length);
        fullCommand.set(header, 0);
        fullCommand.set(body, header.length);

        return fullCommand;
    }

    async function startPrintProcess() {
        if (!gattCharacteristic) {
            alert("Printer belum terhubung!");
            return;
        }
        if (!currentFileType) {
            alert("Pilih file PDF atau Foto terlebih dahulu!");
            return;
        }

        const statusEl = document.getElementById('status');
        statusEl.innerText = "Mempersiapkan pencetakan...";

        try {
            const canvas = document.getElementById('renderCanvas');
            
            // Inisialisasi printer
            await sendDataInChunks(new Uint8Array([0x1B, 0x40]));

            if (currentFileType === 'pdf') {
                for (let pageNum = 1; pageNum <= currentPdfDoc.numPages; pageNum++) {
                    statusEl.innerText = `Mencetak PDF Halaman ${pageNum} dari ${currentPdfDoc.numPages}...`;
                    await renderPdfPageToCanvas(pageNum);
                    
                    const imageBytes = canvasToEscPosRaster(canvas);
                    await sendDataInChunks(imageBytes);

                    await sendDataInChunks(new Uint8Array([0x1B, 0x64, 0x03]));
                }
            } else if (currentFileType === 'image') {
                statusEl.innerText = "Mencetak gambar...";
                const imageBytes = canvasToEscPosRaster(canvas);
                await sendDataInChunks(imageBytes);
            }

            // Feed Kertas
            await sendDataInChunks(new Uint8Array([0x0A, 0x0A, 0x0A]));

            statusEl.innerText = "Selesai mencetak! 🎉";
        } catch (error) {
            console.error(error);
            alert("Gagal mencetak: " + error.message);
        }
    }

    async function sendDataInChunks(data) {
        const CHUNK_SIZE = 100; // Ukuran aman BLE

        for (let i = 0; i < data.length; i += CHUNK_SIZE) {
            const chunk = data.slice(i, i + CHUNK_SIZE);

            try {
                if (gattCharacteristic.writeValueWithoutResponse) {
                    await gattCharacteristic.writeValueWithoutResponse(chunk);
                } else {
                    await gattCharacteristic.writeValue(chunk);
                }
            } catch (e) {
                await gattCharacteristic.writeValue(chunk);
            }

            await new Promise(resolve => setTimeout(resolve, 30)); 
        }
    }
</script>

</body>
</html>
