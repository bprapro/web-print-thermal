<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak PDF ke Thermal 58mm via WebBluetooth</title>
    <!-- Import Library PDF.js dari CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; width: 100%; max-width: 450px; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        h2 { text-align: center; border-bottom: 2px dashed #333; padding-bottom: 10px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 14px; }
        input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { padding: 12px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-connect { background: #2980b9; color: white; }
        .btn-print { background: #27ae60; color: white; }
        .btn-print:disabled { background: #a5d6a7; cursor: not-allowed; }
        .status { margin-top: 15px; padding: 10px; background: #eee; text-align: center; font-size: 12px; border-radius: 4px; font-weight: bold; }
        
        /* Area Preview Canvas */
        .preview-box { margin-top: 15px; text-align: center; background: #fffde7; border: 1px dashed #999; padding: 10px; }
        canvas { max-width: 100%; height: auto; border: 1px solid #ddd; margin-top: 5px; background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2>📄 Cetak PDF (Thermal 58mm)</h2>

    <div class="form-group">
        <label for="pdfFile">Pilih File PDF:</label>
        <input type="file" id="pdfFile" accept="application/pdf">
    </div>

    <div class="btn-group">
        <button class="btn-connect" onclick="connectPrinter()">🔌 1. Sambungkan Printer</button>
        <button class="btn-print" id="btnPrint" onclick="printPDF()" disabled>🖨️ 2. Cetak PDF Sekarang</button>
    </div>

    <div id="status" class="status">Status: Belum Terhubung</div>

    <div class="preview-box">
        <label>Pratinjau Hasil Render (Halaman 1):</label>
        <div><canvas id="pdfCanvas"></canvas></div>
    </div>
</div>

<script>
    // Konfigurasi Worker PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let bluetoothDevice;
    let gattCharacteristic;
    let currentPdfDoc = null;
    const MAX_PRINTER_WIDTH = 384; // Lebar piksel standar untuk printer thermal 58mm

    // Listener saat file PDF diunggah
    document.getElementById('pdfFile').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file || file.type !== 'application/pdf') {
            alert('Harap pilih file berformat PDF!');
            return;
        }

        const statusEl = document.getElementById('status');
        statusEl.innerText = "Membaca file PDF...";

        const fileReader = new FileReader();
        fileReader.onload = async function() {
            const typedarray = new Uint8Array(this.result);
            try {
                currentPdfDoc = await pdfjsLib.getDocument(typedarray).promise;
                statusEl.innerText = `PDF Berhasil Dimuat (${currentPdfDoc.numPages} Halaman)`;
                // Render halaman pertama ke canvas sebagai preview
                await renderPdfPageToCanvas(1);
            } catch (err) {
                console.error(err);
                statusEl.innerText = "Gagal membaca PDF: " + err.message;
            }
        };
        fileReader.readAsArrayBuffer(file);
    });

    // 1. Fungsi Render Halaman PDF ke HTML5 Canvas
    async function renderPdfPageToCanvas(pageNumber) {
        if (!currentPdfDoc) return;

        const page = await currentPdfDoc.getPage(pageNumber);
        const unscaledViewport = page.getViewport({ scale: 1.0 });

        // Hitung skala agar lebar gambar pas 384 pixel (Lebar maksimal thermal 58mm)
        const scale = MAX_PRINTER_WIDTH / unscaledViewport.width;
        const viewport = page.getViewport({ scale: scale });

        const canvas = document.getElementById('pdfCanvas');
        const context = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;

        const renderContext = {
            canvasContext: context,
            viewport: viewport
        };

        await page.render(renderContext).promise;
    }

    // 2. Hubungkan ke Printer Bluetooth
    async function connectPrinter() {
        const statusEl = document.getElementById('status');
        try {
            statusEl.innerText = "Mencari printer Bluetooth...";

            // Meminta akses perangkat Bluetooth
            bluetoothDevice = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['00001101-0000-1000-8000-00805f9b34fb', '000018f0-0000-1000-8000-00805f9b34fb']
            });

            statusEl.innerText = `Menghubungkan ke ${bluetoothDevice.name}...`;
            const server = await bluetoothDevice.gatt.connect();

            // Coba ambil service utama
            let service;
            try {
                service = await server.getPrimaryService('00001101-0000-1000-8000-00805f9b34fb');
            } catch (e) {
                service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            }

            const characteristics = await service.getCharacteristics();
            gattCharacteristic = characteristics[0];

            statusEl.innerText = `Terhubung ke: ${bluetoothDevice.name || 'Printer'} ✅`;
            statusEl.style.background = "#d4edda";
            statusEl.style.color = "#155724";
            document.getElementById('btnPrint').disabled = false;
        } catch (error) {
            console.error(error);
            statusEl.innerText = "Gagal terhubung: " + error.message;
            statusEl.style.background = "#f8d7da";
            statusEl.style.color = "#721c24";
        }
    }

    // 3. Konversi Canvas Pixel ke Perintah ESC/POS Bit-Image (GS v 0)
    function canvasToEscPosRaster(canvas) {
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const imgData = ctx.getImageData(0, 0, width, height).data;

        const bytesWide = Math.ceil(width / 8);
        const rasterData = [];

        for (let y = 0; y < height; y++) {
            for (let x = 0; x < bytesWide; x++) {
                let byte = 0;
                for (let b = 0; b < 8; b++) {
                    const pixelX = x * 8 + b;
                    if (pixelX < width) {
                        const idx = (y * width + pixelX) * 4;
                        // Ambil nilai RGB & hitung rata-rata Grayscale
                        const r = imgData[idx];
                        const g = imgData[idx + 1];
                        const bVal = imgData[idx + 2];
                        const avg = (r + g + bVal) / 3;

                        // Ambang batas (Threshold): Jika agak gelap/hitam, tandai piksel
                        if (avg < 180) { 
                            byte |= (0x80 >> b);
                        }
                    }
                }
                rasterData.push(byte);
            }
        }

        // Header Perintah ESC/POS untuk Raster Bit Image: GS v 0 0 xL xH yL yH
        const xL = bytesWide & 0xFF;
        const xH = (bytesWide >> 8) & 0xFF;
        const yL = height & 0xFF;
        const yH = (height >> 8) & 0xFF;

        const header = new Uint8Array([0x1D, 0x76, 0x30, 0x00, xL, xH, yL, yH]);
        const body = new Uint8Array(rasterData);

        // Gabungkan Header + Payload Gambar
        const fullCommand = new Uint8Array(header.length + body.length);
        fullCommand.set(header, 0);
        fullCommand.set(body, header.length);

        return fullCommand;
    }

    // 4. Proses Cetak PDF
    async function printPDF() {
        if (!gattCharacteristic) {
            alert("Printer belum terhubung!");
            return;
        }
        if (!currentPdfDoc) {
            alert("Unggah file PDF terlebih dahulu!");
            return;
        }

        const statusEl = document.getElementById('status');
        statusEl.innerText = "Mempersiapkan data cetak...";

        try {
            const canvas = document.getElementById('pdfCanvas');
            
            // Inisialisasi printer (ESC @)
            const initCommand = new Uint8Array([0x1B, 0x40]);
            await sendDataInChunks(initCommand);

            // Cetak halaman per halaman (default halaman 1)
            for (let pageNum = 1; pageNum <= currentPdfDoc.numPages; pageNum++) {
                statusEl.innerText = `Mencetak halaman ${pageNum} dari ${currentPdfDoc.numPages}...`;
                
                await renderPdfPageToCanvas(pageNum);
                const imageBytes = canvasToEscPosRaster(canvas);
                
                // Kirim data gambar ke printer
                await sendDataInChunks(imageBytes);

                // Baris kosong antar halaman (ESC d 3)
                const feedCommand = new Uint8Array([0x1B, 0x64, 0x03]);
                await sendDataInChunks(feedCommand);
            }

            // Feed Kertas di Akhir (3 Baris Baru)
            const finalFeed = new Uint8Array([0x0A, 0x0A, 0x0A]);
            await sendDataInChunks(finalFeed);

            statusEl.innerText = "Selesai mencetak PDF! 🎉";
        } catch (error) {
            console.error(error);
            alert("Terjadi kesalahan saat mencetak: " + error.message);
        }
    }

    // 5. Helper untuk Mengirim Data Secara Bertahap (Chunking 512 Bytes)
    // Bluetooth BLE memiliki batasan MTU (Max Transmission Unit) per pengiriman
    async function sendDataInChunks(data) {
        const CHUNK_SIZE = 512; 
        for (let i = 0; i < data.length; i += CHUNK_SIZE) {
            const chunk = data.slice(i, i + CHUNK_SIZE);
            await gattCharacteristic.writeValue(chunk);
            // Delay kecil agar buffer printer tidak meluap (overflow)
            await new Promise(resolve => setTimeout(resolve, 50)); 
        }
    }
</script>

</body>
</html>
