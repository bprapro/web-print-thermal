<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cetak Nota & PDF</title>
</head>
<body>
  <h2>Sistem Print & Nota</h2>
  
  <input type="text" id="namaFile" placeholder="Nama File / Nota">
  <button onclick="simpanKeDatabase()">Cetak & Simpan Log</button>

  <script>
    const SPREADSHEET_API_URL = "https://script.google.com/macros/s/AKfycbwyxgo3OgB73c3fGjxd7_En-BKcKFY_fDjolbRde0TlNA2iIm1y3pTCDTj8YEfVhTHWyA/exec";

    async function simpanKeDatabase() {
      const namaFile = document.getElementById('namaFile').value;
      
      const payload = {
        nama_file: namaFile,
        status: "Printed"
      };

      try {
        const response = await fetch(SPREADSHEET_API_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        
        alert("Data cetak berhasil tersimpan di Google Sheets!");
      } catch (error) {
        console.error("Gagal menyimpan:", error);
      }
    }
  </script>
</body>
</html>
