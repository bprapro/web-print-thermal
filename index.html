<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cetak Nota via Web Bluetooth</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 14px; }
    input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-connect { background-color: #007bff; color: white; }
    .btn-print { background-color: #28a745; color: white; }
    .status { margin-top: 10px; font-size: 13px; font-weight: bold; text-align: center; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Kasir Thermal Bluetooth</h2>
    
    <!-- Tombol Sambung Bluetooth -->
    <button class="btn-connect" onclick="connectBluetooth()">1. Hubungkan Printer Bluetooth</button>
    <div id="statusBT" class="status" style="color: #d9534f;">Status: Belum Terhubung</div>
    <hr>

    <!-- Form Input Data -->
    <div class="form-group">
      <label>Nama Pelanggan:</label>
      <input type="text" id="pelanggan" placeholder="Contoh: Budi">
    </div>
    <div class="form-group">
      <label>Nama Item / Layanan:</label>
      <input type="text" id="item" placeholder="Contoh: Cetak PDF A4 10 Lbr">
    </div>
    <div class="form-group">
      <label>Total Biaya (Rp):</label>
      <input type="number" id="harga" placeholder="Contoh: 15000">
    </div>

    <!-- Tombol Direct Print -->
    <button id="btnSubmit" class="btn-print" onclick="cetakDanSimpan()" disabled>2. Cetak Nota & Simpan Log</button>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwyxgo3OgB73c3fGjxd7_En-BKcKFY_fDjolbRde0TlNA2iIm1y3pTCDTj8YEfVhTHWyA/exec";

    let bluetoothDevice = null;
    let printCharacteristic = null;

    // 1. Fungsi Hubungkan Ke Printer Bluetooth
    async function connectBluetooth() {
      const statusBT = document.getElementById('statusBT');
      try {
        statusBT.innerText = "Mencari perangkat Bluetooth...";
        
        // Meminta izin browser untuk scan Bluetooth Printer
        bluetoothDevice = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb', '49535343-fe7d-4113-8b09-990024920000'] // UUID standar printer thermal
        });

        const server = await bluetoothDevice.gatt.connect();
        
        // Mengambil Service & Characteristic printer
        const services = await server.getPrimaryServices();
        let service = services[0];
        const characteristics = await service.getCharacteristics();
        printCharacteristic = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);

        if (printCharacteristic) {
          statusBT.innerText = "Status: Terhubung (" + bluetoothDevice.name + ")";
          statusBT.style.color = "#28a745";
          document.getElementById('btnSubmit').disabled = false;
        } else {
          throw new Error("Karakteristik cetak tidak ditemukan.");
        }
      } catch (error) {
        console.error("Bluetooth Error:", error);
        statusBT.innerText = "Gagal terhubung: " + error.message;
        statusBT.style.color = "#d9534f";
      }
    }

    // 2. Fungsi Mengubah Teks jadi ESC/POS Command (Format Printer Struk)
    function generateESCPOS(pelanggan, item, harga) {
      const encoder = new TextEncoder();
      const esc = '\x1B'; // Perintah ESC
      const gs = '\x1D';  // Perintah GS
      
      let cmds = '';
      
      // Reset Printer
      cmds += esc + '@';
      
      // Header: Align Center + Bold
      cmds += esc + 'a' + '\x01'; 
      cmds += esc + 'E' + '\x01'; 
      cmds += 'TOKO PRINT & SCAN\n';
      cmds += esc + 'E' + '\x00'; 
      cmds += 'Jl. Contoh No. 123\n';
      cmds += '--------------------------------\n';
      
      // Body: Align Left
      cmds += esc + 'a' + '\x00';
      cmds += 'Tgl : ' + new Date().toLocaleString('id-ID') + '\n';
      cmds += 'Plg : ' + pelanggan + '\n';
      cmds += '--------------------------------\n';
      cmds += item + '\n';
      cmds += 'Total : Rp ' + parseInt(harga).toLocaleString('id-ID') + '\n';
      cmds += '--------------------------------\n';
      
      // Footer: Align Center
      cmds += esc + 'a' + '\x01';
      cmds += 'Terima Kasih!\n\n\n\n'; // Spasi kertas
      
      // Feed & Cut (Potong Kertas jika didukung)
      cmds += gs + 'V' + '\x41' + '\x03';

      return encoder.encode(cmds);
    }

    // 3. Eksekusi Cetak & Kirim ke Spreadsheet
    async function cetakDanSimpan() {
      const pelanggan = document.getElementById('pelanggan').value || "Umum";
      const item = document.getElementById('item').value || "Jasa Print";
      const harga = document.getElementById('harga').value || "0";

      if (!printCharacteristic) {
        alert("Printer belum terhubung!");
        return;
      }

      try {
        // A. Kirim Data ke Printer Thermal via Bluetooth
        const dataBuffer = generateESCPOS(pelanggan, item, harga);
        await printCharacteristic.writeValue(dataBuffer);

        // B. Kirim Data Log ke Google Sheets
        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            nama_file: `${pelanggan} - ${item} (Rp${harga})`,
            status: "Printed via Bluetooth"
          })
        });

        alert("Sukses! Nota tercetak dan data tersimpan ke Spreadsheet.");
      } catch (error) {
        console.error("Gagal cetak/simpan:", error);
        alert("Terjadi kesalahan saat mencetak ke Bluetooth.");
      }
    }
  </script>
</body>
</html>
